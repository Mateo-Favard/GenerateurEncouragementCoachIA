services:
  audiocoach:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - COACH_OPENROUTER_API_KEY=${COACH_OPENROUTER_API_KEY}
      - COACH_OPENROUTER_MODEL=${COACH_OPENROUTER_MODEL:-minimax/minimax-m2.5}
      - COACH_TTS_MODEL_PATH=models/tts/fr_FR-siwis-medium.onnx
      - COACH_LOG_LEVEL=info
      - COACH_MAX_WORKERS=4
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  test:
    build:
      context: .
      target: test
    profiles:
      - test
